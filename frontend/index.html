<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>GoText</title>
    <script>
        (function () {
            // Pre-paint OS-preference guess, matching main.tsx's initTheme('auto') — avoids a flash
            // of the wrong theme in the gap between HTML parse and the deferred module executing.
            // The persisted theme (backend UIPreferences, not localStorage) is applied a moment
            // later once getUIPreferences resolves.
            if (globalThis.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>
<body>
<div id="root"></div>
<script src="./src/main.tsx" type="module"></script>
</body>
</html>
